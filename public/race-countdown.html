<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <title>Race Countdown</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/styles/global.css" />
    <link rel="stylesheet" href="/styles/components.css" />

</head>

<body>
    <header class="site-header">
        <nav class="menu">
            <div class="menu-item" tabindex="0">
                Menu ▾
                <ul class="dropdown">
                    <li><a href="/front-desk" target="_blank" rel="noopener noreferrer">Front Desk</a></li>
                    <li><a href="/lap-line-tracker" target="_blank" rel="noopener noreferrer">Lap Line Tracker</a>
                    </li>
                    <li><a href="/leaderboard" target="_blank" rel="noopener noreferrer">Leaderboard</a></li>
                    <li><a href="/next-race" target="_blank" rel="noopener noreferrer">Next Race</a></li>
                    <li><a href="/race-control" target="_blank" rel="noopener noreferrer">Race Control</a></li>
                    <li><a href="/race-countdown" target="_blank" rel="noopener noreferrer">Countdown</a></li>
                    <li><a href="/race-flags" target="_blank" rel="noopener noreferrer">Flag Display</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="page">
        <div class="page-header">
            <div class="page-title">Race Countdown</div>
        </div>

        <!-- Countdown timer -->
        <div class="countdown-container">
            <div id="countdown" class="race-countdown">
                --:--
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script>
            const socket = io();
            const countdownEl = document.getElementById("countdown");

            function formatTime(seconds) {
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
            }

            socket.on("timerUpdated", (time) => {
                countdownEl.textContent = formatTime(time);
            });

            socket.on("stateUpdated", (state) => {
                if (typeof state.timer === "number") {
                    countdownEl.textContent = formatTime(state.timer);
                }
            });
        </script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const menuItem = document.querySelector(".menu-item");
                if (!menuItem) return;

                menuItem.addEventListener("click", (event) => {
                    if (event.target.closest(".dropdown")) return;
                    event.preventDefault();
                    if (menuItem.classList.contains("menu-open")) {
                        menuItem.classList.remove("menu-open");
                        menuItem.blur();
                    } else {
                        menuItem.classList.add("menu-open");
                    }
                });

                document.addEventListener("click", (event) => {
                    if (!menuItem.contains(event.target)) {
                        menuItem.classList.remove("menu-open");
                        menuItem.blur();
                    }
                });
            });
        </script>
</body>

</html>
