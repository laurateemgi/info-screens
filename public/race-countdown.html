<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <title>Race Countdown</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/styles/global.css" />
    <link rel="stylesheet" href="/styles/components.css" />

</head>

<body>
    <header class="site-header"></header>
    <div class="page">
        <div class="page-header">
            <div class="page-title">Race Countdown</div>
        </div>

        <!-- Countdown timer -->
        <div class="countdown-container">
            <div id="countdown" class="race-countdown">
                10:00
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script>
            const socket = io();
            const countdownEl = document.getElementById("countdown");

            function formatTime(seconds) {
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
            }

            socket.on("timerUpdated", (time) => {
                countdownEl.textContent = formatTime(time);
            });

            socket.on("stateUpdated", (state) => {
                if (typeof state.timer === "number") {
                    countdownEl.textContent = formatTime(state.timer);
                }
            });
        </script>
</body>

</html>
