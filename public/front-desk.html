<!DOCTYPE html>
<html>

<head>
  <title>Front Desk</title> <!--/shown in browser tab -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/components.css">
</head>

<body>

  <!-- Header -->
  <header class="site-header"></header>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="page">
    <div class="grid">
      <div class="card card-md card-center">
        <div class="card-body">

          <div class="page-header">
            <div class="page-title">Front Desk Access</div>
            <div class="page-subtitle">Enter receptionist access key</div>
          </div>

          <div class="form-row">
            <input
              id="access-key"
              class="input"
              type="password"
              placeholder="Access key"
            >
          </div>

          <div class="session-buttons">
            <button class="btn btn-primary" onclick="unlock()">
              Unlock
            </button>
          </div>

          <div id="auth-error" class="error-message"></div>

        </div>
      </div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen" style="display: none;">

  <!-- Page container -->
  <div class="page">

    <!-- Page title -->
    <div class="page-header">
      <div class="page-title">Racetrack Reception</div>
    </div>



    <!-- MUUDETUD! New session button connected to components -->
    <div class="session-buttons">
      <button class="btn btn-primary" onclick="createSession()">
        + New Session
      </button>
    </div>

    <!-- MUUDETUD! Error message connected to components -->
    <div id="error-message" class="error-message"></div>


    <!-- Session cards rendered by Socket.IO -->
    <div id="sessions" class="grid"></div>

  </div>


  <!-- server connection -->
  <script src="/socket.io/socket.io.js"></script>


  <script>

    let socket = null;
    const authScreen = document.getElementById("auth-screen");
    const appScreen = document.getElementById("app-screen");
    const authError = document.getElementById("auth-error");

    const sessionsDiv = document.getElementById("sessions"); //reference to the HTML container where sessions will be displayed
    const errorDiv = document.getElementById("error-message"); //show error messages in error div
    let lastActiveSessionInput = null; //to get focus on the last field that was used before sending the message to server


    /* CONNECTION between our login screen and real app */
    /* unlock() = authenticate user + open the app if valid + block if not*/
    function unlock() {
        const key = document.getElementById("access-key").value.trim();

        if (!key) {
            authError.textContent = "Access key is required";
            return;
        }

        socket = io(); //after clicking Unlock, the connection is built

        socket.on("authResult", ({ success }) => { //listening auth results
            if (success) {
            authScreen.style.display = "none";
            appScreen.style.display = "block";
            authError.textContent = "";

            registerSocketListeners();
            } else {
            authError.textContent = "Incorrect access key";
            socket.disconnect();
            socket = null;
            }
        });

        socket.emit("verifyKey", {
            role: "receptionist",
            key
        });
        }

    /* SOCKET LISTNERS - so they would be only attached after login (prevents duplicate listeners, invalid sttate updates, memory issues) */
    function registerSocketListeners() {
        socket.on("errorMessage", (message) => { //user gets feedback from frontend (socket.ON)
            showError(message);
        });

        socket.on("sessionsUpdated", (sessions) => {
            renderSessions(sessions);
        });

        socket.on("stateUpdated", (state) => {
            renderSessions(state.sessions);
        });
        }

    /* ERROR HANDLING */
    function showError(message) {
      errorDiv.textContent = message;

      setTimeout(() => {
        errorDiv.textContent = "";
      }, 3000);
    }



    //function triggered when the "Create Session" button is pressed
    //it sends an event to the server requesting a new race session
    function createSession() {

      if (!confirm("Create a new empty session?")) {
        return;
      }

      socket.emit("createSession");
    }


    /* ADD DRIVER */
    function addDriver(sessionId) {

      const input = document.getElementById(`driver-input-${sessionId}`); //ask receptionist to enter drivers' names

      const name = input.value.trim();

      if (!name) {
        showError("Driver name cannot be empty");
        return;
      }

      if (name.length > 20) {
        showError("Driver name must be 20 characters or less");
        return;
      }

      lastActiveSessionInput = sessionId;

      socket.emit("addDriver", { //send event to server with session ID and driver names

        sessionId,
        driverName: name
      });

      input.value = "";
      input.focus(); //after adding a driver, focus the input again so the receptionist can quickly add multiple drivers
    }



    /* REMOVE DRIVER */
    function removeDriver(sessionId, driverName) {

      socket.emit("removeDriver", {
        sessionId,
        driverName
      });
    }



    /* DELETE SESSION */
    function deleteSession(sessionId) {
      socket.emit("deleteSession", sessionId);
    }



    //listen for updates from the server when session data changes
    //server sends the updated sessions list
    function renderSessions (sessions) {
      sessionsDiv.innerHTML = ""; //if update then clear the current session display


      sessions.forEach(session => {
        const div = document.createElement("div");
        // MUUDETUD! Connected to components by using session-card
        div.className = "session-card card card-lg";

        div.innerHTML = `
            <h3>${session.id}</h3>

            <ul>
                ${session.drivers.map(d => `
                    <li class="driver-row">

                      <span class="car-badge">
                            CAR ${d.carNumber}
                        </span>

                        <span class="driver-label">
                            ${d.name}
                        </span>

                        <button 
                            class="remove-btn"
                            onclick="removeDriver('${session.id}','${d.name}')">
                            X
                        </button>

                    </li>
                `).join("")}
            </ul>


            <div class="driver-form">
                ${session.drivers.length < 8
            ? `
                    <input
                        id="driver-input-${session.id}"
                        class="input"
                        type="text"
                        placeholder="Enter driver name"
                        maxlength="20"
                        onkeydown="if(event.key === 'Enter') addDriver('${session.id}')"
                    >

                    <button 
                        class="btn btn-primary"
                        onclick="addDriver('${session.id}')">
                        Add Driver
                    </button>
                  `
            : `
                    <button class="btn" disabled>
                        Session Full
                    </button>
                  `
          }

               <button 
          class="btn btn-red"
         onclick="deleteSession('${session.id}')">
         Delete Session
      </button>
    </div>

        `;

        sessionsDiv.appendChild(div); //1.2 add the completed session element to the page
      });


      if (lastActiveSessionInput) { //restore focus after rendering
        const input = document.getElementById(
          `driver-input-${lastActiveSessionInput}`
        );

        if (input) {
          input.focus();
        }
      }

    };

  </script>

  </div>

</body>

</html>
