<!DOCTYPE html>
<html>

<head>
    <title>Leaderboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 30px;
        }

        /* Table styling similar to session cards */
        .leaderboard-card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            max-width: 800px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            margin-left: auto;
            margin-right: auto;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            text-align: center;
        }

        th {
            font-size: 24px;
            padding: 14px;
            background-color: #eeeeee;
            font-weight: bold;
        }

        td {
            font-size: 18px;
            padding: 12px;
        }

        th,
        td {
            border: 1px solid rgb(0, 0, 0);
            padding: 10px;
        }

        .placeholder {
            font-size: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <h1>Race Leaderboard</h1>


    <table>
        <tr>
            <th>Position</th>
            <th>Driver</th>
            <th>Car</th>
            <th>Laps</th>
            <th>Fastest Lap</th>
        </tr>

        <tr>
            <td colspan="5">No race data yet</td>
        </tr>
    </table>

</body>

</html>
