<html>

<head>
    <title>Leaderboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/components.css">
</head>

<body>

    <header class="site-header">
        <nav class="menu">
            <div class="menu-item">
                Menu ▾
                <ul class="dropdown">
                    <li><a href="/front-desk.html" target="_blank" rel="noopener noreferrer">Front Desk</a></li>
                    <li><a href="/lap-line-tracker.html" target="_blank" rel="noopener noreferrer">Lap Line Tracker</a>
                    </li>
                    <li><a href="/leaderboard.html" target="_blank" rel="noopener noreferrer">Leaderboard</a></li>
                    <li><a href="/next-race.html" target="_blank" rel="noopener noreferrer">Next Race</a></li>
                    <li><a href="/race-control.html" target="_blank" rel="noopener noreferrer">Race Control</a></li>
                    <li><a href="/race-countdown.html" target="_blank" rel="noopener noreferrer">Countdown</a></li>
                    <li><a href="/race-flags.html" target="_blank" rel="noopener noreferrer">Flag Display</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Page content -->
    <div class="page">

        <div class="page-header leaderboard-header-flex">
            <div class="page-title">Leaderboard</div>
            <div id="leaderboard-timer" class="leaderboard-mini-timer">10:00</div>
            <div id="leaderboard-flag" class="flag-box"></div>
        </div>

        <!-- Grid layout for cards-->
        <div class="grid">
            <!-- Leaderboard card -->
            <div class="card card-md card-center">
                <div class="card-body">
                    <div class="table-wrapper"> <!-- CHANGED: added wrapper for responsive scrolling -->
                        <table class="table leaderboard-table">
                            <thead>
                                <tr>
                                    <th>
                                        <span class="leaderboard-desktop-label">Position</span>
                                        <span class="leaderboard-mobile-label">Pos</span>
                                    </th>
                                    <th>Driver</th>
                                    <th>Car</th>
                                    <th>Laps</th>
                                    <th>
                                        <span class="leaderboard-desktop-label">Fastest Lap</span>
                                        <span class="leaderboard-mobile-label">Fastest</span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body">
                                <tr>
                                    <td colspan="5" class="placeholder">No race data yet</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Socket.IO -->
        <script src="/socket.io/socket.io.js"></script>

        <script>
            // Connect to server
            const socket = io();

            const timerEl = document.getElementById("leaderboard-timer");
            const flagEl = document.getElementById("leaderboard-flag");

            let RACE_MODES = {};    //15.1 constants

            socket.on("connect", () => {
                console.log("Leaderboard connected");
            });

            // Function to format seconds into MM:SS
            function formatTime(seconds) {
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
            }

            // Function to update the small flag box class
            function updateLeaderboardFlag(mode) {
                if (!flagEl) return;

                // Remove old classes
                flagEl.classList.remove("flag-safe", "flag-hazard", "flag-danger", "flag-finish");

                const m = (mode || "DANGER").toUpperCase();
                const safe = (RACE_MODES.SAFE || "SAFE");       //15.1 constants
                const hazard = (RACE_MODES.HAZARD || "HAZARD"); //15.1
                const finish = (RACE_MODES.FINISH || "FINISH"); //15.1


                if (m === safe) {                           //15.1 "SAFE" to safe
                    flagEl.classList.add("flag-safe");
                } else if (m === hazard) {                  //15.1
                    flagEl.classList.add("flag-hazard");
                } else if (m === finish) {                  //15.1
                    flagEl.classList.add("flag-finish");
                } else {
                    flagEl.classList.add("flag-danger");
                }
            }

            // 1. Listen for per-second timer updates
            socket.on("timerUpdated", (time) => {
                if (timerEl) timerEl.textContent = formatTime(time);
            });

            socket.on("initConstants", (constants) => {     //15.1 constants
                RACE_MODES = constants.RACE_MODES;          //
            });                                             //

            // 2. Listen for full state updates (on refresh or change)
            socket.on("stateUpdated", (state) => {
                if (!state) return;

                // timer
                if (typeof state.timer === "number") {
                    timerEl.textContent = formatTime(state.timer);
                }

                // flag
                if (state.raceMode) {
                    updateLeaderboardFlag(state.raceMode);
                }

                // MAIN FIX, et peale end session kuvaks lehel infot edasi
                if (state.raceStarted) {
                    // During race → live data
                    renderLeaderboard(state.laps);
                } else if (state.lastFinishedSession && state.lastFinishedSession.laps) {
                    // After END SESSION → use saved data
                    renderLeaderboard(state.lastFinishedSession.laps);
                } else {
                    renderLeaderboard({});
                }
            });
            // 3. Listen for immediate flag changes
            socket.on("flagChanged", (mode) => {
                updateLeaderboardFlag(mode);
            });




            // Show data after refresh
            socket.emit("requestState");

            // Convert milliseconds to seconds
            function formatLapTime(ms) {
                if (!ms) return "-";

                const seconds = ms / 1000;
                return seconds.toFixed(2) + " sec";
            }
            function getLeaderboardData(state) {

                // race running
                if (state.raceStarted && !state.raceEnded) {
                    return state.laps;
                }

                // race finished but session not ended yet
                if (state.raceEnded && state.currentSession) {
                    return state.laps;
                }

                // after session ended
                if (!state.currentSession && state.lastFinishedSession) {
                    return state.lastFinishedSession.laps || {};
                }

                return {};
            }

            // Function to render table rows
            function renderLeaderboard(laps) {

                const tbody = document.getElementById("leaderboard-body");

                // Clear old data
                tbody.innerHTML = "";

                // Convert object → array so we can loop & sort
                // let cars = Object.entries(laps).filter(([num, data]) => data.fastest > 0);
                const cars = Object.entries(laps); //selleks, et leaderboard näitaks ka autosid, kellel pole veel kiiret ringi, muidu on alguses tühi ja tekib alles siis, kui keegi lõpetab ringi.


                // Sort by fastest lap (smallest time first)
                cars.sort((a, b) => {
                    const aFast = a[1].fastest > 0 ? a[1].fastest : Infinity;
                    const bFast = b[1].fastest > 0 ? b[1].fastest : Infinity;
                    return aFast - bFast;
                });

                // Loop through cars
                cars.forEach(([carNumber, data], index) => {

                    const tr = document.createElement("tr");


                    tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>
                        <div class="leaderboard-driver-scroll">${data.driverName || "-"}</div>
                    </td>
                    <td>${carNumber}</td>
                    <td>${data.lap}</td>
                    <td>${formatLapTime(data.fastest)}</td>
                `;

                    tbody.appendChild(tr);
                });

                // Fallback if no data
                if (cars.length === 0) {
                    const tr = document.createElement("tr");
                    const td = document.createElement("td");

                    td.colSpan = 5;
                    td.className = "placeholder";
                    td.innerText = "No race data yet";

                    tr.appendChild(td);
                    tbody.appendChild(tr);
                }
            }

        </script>

</body>

</html>
