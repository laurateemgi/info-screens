<!DOCTYPE html>
<html>

<head>
    <title>Leaderboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/components.css">
</head>

<body>

    <header class="site-header">
    </header>

    <!-- Page content -->
    <div class="page">

        <div class="page-header">
            <div class="page-title">Leaderboard</div>
        </div>

        <!-- Grid layout for cards-->
        <div class="page">
            <div class="grid">
                <!-- Leaderboard card -->
                <div class="card card-md card-center">
                    <div class="card-body">
                        <div class="table-wrapper"> <!-- CHANGED: added wrapper for responsive scrolling -->
                            <table class="table leaderboard-table">
                                <thead>
                                    <tr>
                                        <th>Position</th>
                                        <th>Driver</th>
                                        <th>Car</th>
                                        <th>Laps</th>
                                        <th>Fastest Lap</th>
                                    </tr>
                                </thead>
                                <tbody id="leaderboard-body">
                                    <tr>
                                        <td colspan="5" class="placeholder">No race data yet</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Socket.IO -->
        <script src="/socket.io/socket.io.js"></script>

        <script>
            // Connect to server
            const socket = io();

            socket.on("connect", () => {
                console.log("Leaderboard connected");
            });

            // Listen for leaderboard updates from server
            socket.on("leaderboardUpdated", (laps) => {
                renderLeaderboard(laps);
            });

            // Function to render table rows
            function renderLeaderboard(laps) {

                const tbody = document.getElementById("leaderboard-body");

                // Clear old data
                tbody.innerHTML = "";

                // Convert object → array so we can loop & sort
                let cars = Object.entries(laps);

                // Sort by fastest lap (smallest time first)
                cars.sort((a, b) => {
                    const aFast = a[1].fastest || Infinity;
                    const bFast = b[1].fastest || Infinity;
                    return aFast - bFast;
                });

                // Loop through cars
                cars.forEach(([carNumber, data], index) => {

                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                    <td>${index + 1}</td> <!-- position -->
                    <td>${data.driverName || "-"}</td>
                    <td>${carNumber}</td>
                    <td>${data.lap}</td>
                    <td>${data.fastest ? data.fastest : "-"}</td>
                `;

                    tbody.appendChild(tr);
                });

                // Fallback if no data
                if (cars.length === 0) {
                    const tr = document.createElement("tr");
                    const td = document.createElement("td");
                    td.colSpan = 5;
                    td.innerText = "No race data yet";
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                }
            }
        </script>

</body>

</html>
