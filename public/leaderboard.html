<!DOCTYPE html>
<html>

<head>
    <title>Leaderboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 30px;
        }

        /* Table styling similar to session cards */
        .leaderboard-card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            max-width: 800px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            margin-left: auto;
            margin-right: auto;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            text-align: center;
        }

        th {
            font-size: 24px;
            padding: 14px;
            background-color: #eeeeee;
            font-weight: bold;
        }

        td {
            font-size: 18px;
            padding: 12px;
        }

        th,
        td {
            border: 1px solid rgb(0, 0, 0);
            padding: 10px;
        }

        .placeholder {
            font-size: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <h1>Race Leaderboard</h1>

    <div class="leaderboard-card">

        <table>
            <thead> <!-- for cleaner structure -->
                <tr>
                    <th>Position</th>
                    <th>Driver</th>
                    <th>Car</th>
                    <th>Laps</th>
                    <th>Fastest Lap</th>
                </tr>
            </thead>

            <!-- Added tbody with ID so JS can update it -->
            <tbody id="leaderboard-body">

                <tr>
                    <td colspan="5">No race data yet</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Socket.IO script -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        // Connect to server
        const socket = io();

        socket.on("connect", () => {
            console.log("Leaderboard connected");
        });

        // Listen for leaderboard updates from server
        socket.on("leaderboardUpdated", (laps) => {
            renderLeaderboard(laps);
        });

        // Function to render table rows
        function renderLeaderboard(laps) {

            const tbody = document.getElementById("leaderboard-body");

            // Clear old data
            tbody.innerHTML = "";

            // Convert object → array so we can loop & sort
            let cars = Object.entries(laps);

            // Sort by fastest lap (smallest time first)
            cars.sort((a, b) => {
                const aFast = a[1].fastest || Infinity;
                const bFast = b[1].fastest || Infinity;
                return aFast - bFast;
            });

            // Loop through cars
            cars.forEach(([carNumber, data], index) => {

                const tr = document.createElement("tr");

                tr.innerHTML = `
                    <td>${index + 1}</td> <!-- position -->
                    <td>${data.driverName || "-"}</td>
                    <td>${carNumber}</td>
                    <td>${data.lap}</td>
                    <td>${data.fastest ? data.fastest : "-"}</td>
                `;

                tbody.appendChild(tr);
            });

            // Fallback if no data
            if (cars.length === 0) {
                const tr = document.createElement("tr");
                const td = document.createElement("td");
                td.colSpan = 5;
                td.innerText = "No race data yet";
                tr.appendChild(td);
                tbody.appendChild(tr);
            }
        }
    </script>

</body>

</html>
