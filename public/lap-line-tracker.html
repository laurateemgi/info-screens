<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lap Line Tracker</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/components.css">
</head>

<body>

    <!-- Header -->
    <header class="site-header">
        <nav class="menu">
            <div class="menu-item">
                Menu ▾
                <ul class="dropdown">
                    <li><a href="/front-desk" target="_blank" rel="noopener noreferrer">Front Desk</a></li>
                    <li><a href="/lap-line-tracker" target="_blank" rel="noopener noreferrer">Lap Line Tracker</a>
                    </li>
                    <li><a href="/leaderboard" target="_blank" rel="noopener noreferrer">Leaderboard</a></li>
                    <li><a href="/next-race" target="_blank" rel="noopener noreferrer">Next Race</a></li>
                    <li><a href="/race-control" target="_blank" rel="noopener noreferrer">Race Control</a></li>
                    <li><a href="/race-countdown" target="_blank" rel="noopener noreferrer">Countdown</a></li>
                    <li><a href="/race-flags" target="_blank" rel="noopener noreferrer">Flag Display</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="page">

        <div class="page-header">
            <div class="page-title">Lap Tracker Access</div>
            <div class="page-subtitle">Enter observer access key</div>
        </div>

        <div class="grid">
            <div class="card card-md card-center">
                <div class="card-body text-center">

                    <div class="form-row">
                        <input id="access-key" class="input" type="password" placeholder="Access key">
                    </div>

                    <div class="session-buttons">
                        <button class="btn btn-primary" onclick="unlock()">
                            Unlock
                        </button>
                    </div>

                    <div id="auth-error" class="error-message"></div>

                </div>
            </div>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" style="display:none;">

        <div class="page">

            <!-- Page title -->
            <div class="page-header">
                <div class="page-title">Lap Line Tracker</div>
                <div class="page-subtitle">Press the button when each car crosses the line</div>
            </div>

            <!-- Grid & Card -->
            <div class="grid">
                <div class="card card-md card-center">
                    <div class="card-body text-center">

                        <!-- Buttons -->
                        <div id="lap-buttons"></div>

                        <!-- Message area -->
                        <div id="message" class="placeholder"></div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;

        const authScreen = document.getElementById("auth-screen");
        const appScreen = document.getElementById("app-screen");
        const authError = document.getElementById("auth-error");
        const accessInput = document.getElementById("access-key");

        const lapButtonsDiv = document.getElementById("lap-buttons");
        const messageDiv = document.getElementById("message");

        let lapButtons = [];
        let MAX_DRIVERS = 8;  //15.1 constants

        accessInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                unlock();
            }
        });


        function registerSocketListeners() {
            socket.on("connect", () => {
                console.log("Connected to server");
            });

            socket.on("initConstants", (constants) => {   //15.1 constants
                MAX_DRIVERS = constants.MAX_DRIVERS;       //15.1
            });                                             //15.1

            socket.on("stateUpdated", (state) => {
                updateLapButtonsState(state);
            });

            socket.on("sessionEnded", () => {
                disableAllLapButtons();
                messageDiv.innerText = "Race session ended";
                messageDiv.classList.add("placeholder");
            });

            socket.on("disconnect", () => {
                socket = null;
            });

        }

        function renderLapButtons() {
            lapButtonsDiv.innerHTML = "";
            lapButtons = [];

            for (let i = 1; i <= MAX_DRIVERS; i++) {   //15.1 constants: 8 to MAX_DRIVERS
                const btn = document.createElement("button");
                btn.className = "btn";
                btn.innerText = "CAR " + i;
                btn.disabled = true;

                btn.addEventListener("click", () => {
                    if (!socket) return;

                    messageDiv.innerText = `Lap recorded for CAR ${i}`;
                    messageDiv.classList.add("placeholder");

                    socket.emit("recordLap", i);
                    console.log("Lap sent for CAR", i);

                    btn.disabled = true;
                    btn.classList.add("active");

                    setTimeout(() => {
                        btn.classList.remove("active");

                        if (!btn.dataset.locked) {
                            btn.disabled = false;
                        }
                    }, 800);
                });

                lapButtonsDiv.appendChild(btn);
                lapButtons.push(btn);
            }
        }

        function updateLapButtonsState(state) {
            const isDanger = state.raceMode === "DANGER";
            const shouldEnable = state.raceStarted && !state.raceEnded && !isDanger; //buttons are active only when a race is ongoing

            // get only active cars from current session
            let activeCars = [];

            if (state.currentSession && state.currentSession.drivers) {
                activeCars = state.currentSession.drivers.map(d => d.carNumber);
            }

            lapButtons.forEach((btn, index) => {

                const carNumber = index + 1;
                const isActiveCar = activeCars.includes(carNumber);

                if (shouldEnable && isActiveCar) {

                    // enable only session cars
                    btn.disabled = false;
                    btn.dataset.locked = "";

                } else {

                    // disable unused cars
                    btn.disabled = true;
                    btn.dataset.locked = "true";
                    btn.classList.remove("active");

                }
            });

            // message logic
            if (isDanger && state.raceStarted && !state.raceEnded) {
                messageDiv.innerText = "DANGER — Stop driving";
                messageDiv.classList.add("placeholder");
            } else if (state.raceEnded) {
                messageDiv.innerText = "Race finished. Waiting for session end.";
                messageDiv.classList.add("placeholder");
            } else if (state.raceStarted) {
                messageDiv.innerText = "Lap tracking active";
                messageDiv.classList.add("placeholder");
            } else {
                messageDiv.innerText = "Waiting for race start";
                messageDiv.classList.add("placeholder");
            }
        }

        function disableAllLapButtons() {
            lapButtons.forEach((btn) => {
                btn.disabled = true;
                btn.dataset.locked = "true";
                btn.classList.remove("active");
            });
        }

        /* make sure stateUpdated is not sent too early, before this page starts listening for it */
        function unlock() {
            if (socket) return;

            const key = accessInput.value.trim();

            if (!key) {
                authError.textContent = "Access key is required";
                accessInput.focus();
                return;
            }

            authError.textContent = "";
            socket = io();

            socket.once("authResult", ({ success }) => {
                if (!success) {
                    authError.textContent = "Incorrect access key";
                    accessInput.value = "";
                    socket.disconnect();
                    socket = null;
                    accessInput.focus();
                    return;
                }

                accessInput.value = "";
                authScreen.style.display = "none";
                appScreen.style.display = "block";
                authError.textContent = "";

                registerSocketListeners();
                renderLapButtons();
                socket.emit("requestState");
            });

            socket.emit("verifyKey", {
                role: "observer",
                key
            });
        }

    </script>

</body>

</html>
