<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lap Line Tracker</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/components.css">
</head>

<body>

    <!-- Header -->
    <header class="site-header">
    </header>

    <div class="page">

        <!-- Page title -->
        <div class="page-header">
            <div class="page-title">Lap Line Tracker</div>
            <div class="page-subtitle">Press the button when each car crosses the line</div>
        </div>

        <!-- Grid & Card -->
        <div class="grid">
            <div class="card card-md card-center">
                <div class="card-body text-center">
                    <!-- Buttons -->
                    <div id="lap-buttons">
                    </div>

                    <!-- Message area -->
                    <div id="message" class="placeholder">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- SOCKET.IO & BUTTON LOGIC
         - This part generates lap buttons dynamically
         - Sends laps to server using socket.io
         - Applies .btn styling from components.css
         - Active/disabled states match the lap-button CSS -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on("connect", () => {
            console.log("Connected to server");
        });

        const lapButtonsDiv = document.getElementById("lap-buttons");

        for (let i = 1; i <= 8; i++) {
            const btn = document.createElement("button");

            // Use the .btn class from components.css for consistent style
            btn.className = "btn";
            btn.innerText = "CAR " + i;

            btn.addEventListener("click", () => {
                const message = document.getElementById("message");

                // Show temporary message
                message.innerText = `Lap recorded for CAR ${i}`;
                message.classList.add("placeholder");

                // Emit lap to server
                socket.emit("recordLap", i);
                console.log("Lap sent for CAR", i);

                // Disable button temporarily for 0.8s to prevent double press
                btn.disabled = true;
                btn.classList.add("active"); // optional pressed effect
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.remove("active");
                }, 800);
            });

            lapButtonsDiv.appendChild(btn);
        }
    </script>

</body>

</html>
