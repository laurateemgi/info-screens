<!DOCTYPE html>
<html>

<head>
    <title>Lap Line Tracker</title>
    <style>
        /* Space / breathing room for buttons */
        #lap-buttons {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            /* wrap buttons to next row */
            gap: 10px;
            /* space between buttons */
        }

        /* Make buttons bigger and easier to press */
        #lap-buttons button {
            padding: 20px 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }


        /* Message area spacing */
        #message {
            margin-top: 15px;
            font-weight: bold;
        }

        #lap-buttons button:disabled {
            background-color: rgb(255, 41, 41);
            /* when background color changes, the text stays visible */
            color: white;
            cursor: not-allowed;
        }
    </style>

</head>

<body>
    <h1>Lap Line Tracker</h1>

    <!-- Message area -->
    <div id="message">Press a car button when it crosses the line.</div>

    <!-- Lap buttons -->
    <div id="lap-buttons">
        <!-- Buttons will be added here -->
    </div>

    <!-- This will make this file talk to the server using Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>

    <script>

        // const socket = io(); → This opens a connection to the backend.
        // socket.on("connect", ...) → Confirms the connection and is useful for testing.

        const socket = io();

        socket.on("connect", () => {
            console.log("Connected to server");
        });

        // Generate buttons for CAR 1 → CAR 8
        const lapButtonsDiv = document.getElementById("lap-buttons");

        for (let i = 1; i <= 8; i++) {
            const btn = document.createElement("button");
            btn.innerText = "CAR " + i;

            // When pressed, show a message
            btn.onclick = () => {
                // Show a message
                document.getElementById("message").innerText = `Lap recorded for CAR ${i}`;

                // Send lap to server
                socket.emit("recordLap", i);
                console.log("Lap sent for CAR", i);

                // Disable the button for 1 second to prevent double press
                btn.disabled = true;  // button is temporarily disabled
                setTimeout(() => {
                    btn.disabled = false; // re-enable after 1 second
                }, 1000);
            };

            lapButtonsDiv.appendChild(btn);
        }
    </script>

</body>

</html>
