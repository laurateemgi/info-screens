<!DOCTYPE html>
<html>

<head>
    <title>Next Race</title>
    <style>
        /* Page styling */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            margin-bottom: 10px;
        }

        /* Card container for consistency */
        .next-race-card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            text-align: center;
        }

        th,
        td {
            border: 1px solid #000000;
            padding: 10px;
            font-size: 18px;
        }

        th {
            background-color: #eee;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Next Race</h1>

    <!-- Card container for next race table -->
    <div class="next-race-card">
        <table>
            <thead>
                <tr>
                    <!-- Table headers -->
                    <th>Driver</th>
                    <th>Car Number</th>
                </tr>
            </thead>

            <!-- Placeholder row -->
            <tbody id="drivers-table">
                <tr>
                    <td colspan="2">Next race drivers will appear here</td>
                </tr>
            </tbody>
        </table>

        <!-- Socket.IO -->
        <script src="/socket.io/socket.io.js"></script>
        <script>
            const socket = io();

            socket.on("connect", () => {
                console.log("Next Race screen connected");
            });


            // Listen for session updates
            socket.on("sessionsUpdated", (sessions) => {
                const tbody = document.getElementById("drivers-table");
                tbody.innerHTML = ""; // clear previous rows

                if (!sessions || sessions.length === 0) {
                    // No upcoming sessions
                    const tr = document.createElement("tr");
                    const td = document.createElement("td");
                    td.colSpan = 2;
                    td.innerText = "No upcoming races";
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                    return;
                }

                // Show the first session only (next session)
                const nextSession = sessions[0];

                if (!nextSession.drivers || nextSession.drivers.length === 0) {
                    const tr = document.createElement("tr");
                    const td = document.createElement("td");
                    td.colSpan = 2;
                    td.innerText = "No drivers in next session";
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                    return;
                }

                // Populate drivers
                nextSession.drivers.forEach(driver => {
                    const tr = document.createElement("tr");

                    const tdName = document.createElement("td");
                    tdName.innerText = driver.name;
                    tr.appendChild(tdName);

                    const tdCar = document.createElement("td");
                    tdCar.innerText = driver.carNumber;
                    tr.appendChild(tdCar);

                    tbody.appendChild(tr);
                });
            });
        </script>

</body>

</html>
