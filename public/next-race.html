<!DOCTYPE html>
<html>

<head>
    <title>Next Race</title>

    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/components.css">
</head>


<body>

    <header class="site-header"></header>

    <div class="page">

        <!-- PAGE TITLE -->
        <div class="page-header">
            <div class="page-title">Next Race</div>
            <div class="page-subtitle">
                Upcoming drivers for the next race
            </div>
        </div>


        <!-- ==============================
             GRID LAYOUT
             Allows multiple cards
        ============================== -->
        <div class="page">
            <div class="grid">

                <!-- ==============================
                 NEXT RACE CARD
                 Uses global card system
            ============================== -->
                <div class="card card-md card-center">

                    <div class="card-body">

                        <!-- Table from components.css -->
                        <table class="table">

                            <thead>
                                <tr>
                                    <th>Driver</th>
                                    <th>Car Number</th>
                                </tr>
                            </thead>

                            <tbody id="drivers-table">

                                <!-- Placeholder when empty -->
                                <tr>
                                    <td colspan="2" class="placeholder">
                                        No next race data yet
                                    </td>
                                </tr>

                            </tbody>

                        </table>

                    </div>
                </div>

            </div>
        </div>


        <!-- Socket.IO -->
        <script src="/socket.io/socket.io.js"></script>
        <script>
            const socket = io();

            socket.on("connect", () => {
                console.log("Next Race screen connected");
            });


            // Listen for session updates
            socket.on("sessionsUpdated", (sessions) => {
                const tbody = document.getElementById("drivers-table");
                tbody.innerHTML = ""; // clear previous rows

                if (!sessions || sessions.length === 0) {
                    // No upcoming sessions
                    const tr = document.createElement("tr");
                    const td = document.createElement("td");
                    td.colSpan = 2;
                    td.innerText = "No upcoming races";
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                    return;
                }

                // Show the first session only (next session)
                const nextSession = sessions[0];

                if (!nextSession.drivers || nextSession.drivers.length === 0) {
                    const tr = document.createElement("tr");
                    const td = document.createElement("td");
                    td.colSpan = 2;
                    td.innerText = "No drivers in next session";
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                    return;
                }

                // Populate drivers
                nextSession.drivers.forEach(driver => {
                    const tr = document.createElement("tr");

                    const tdName = document.createElement("td");
                    tdName.innerText = driver.name;
                    tr.appendChild(tdName);

                    const tdCar = document.createElement("td");
                    tdCar.innerText = driver.carNumber;
                    tr.appendChild(tdCar);

                    tbody.appendChild(tr);
                });
            });
        </script>

</body>

</html>
