<!DOCTYPE html>
<html>

<head>
    <title>Next Race</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/components.css">
</head>


<body>

    <header class="site-header">
        <nav class="menu">
            <div class="menu-item" tabindex="0">
                Menu ▾
                <ul class="dropdown">
                    <li><a href="/front-desk" target="_blank" rel="noopener noreferrer">Front Desk</a></li>
                    <li><a href="/lap-line-tracker" target="_blank" rel="noopener noreferrer">Lap Line Tracker</a>
                    </li>
                    <li><a href="/leaderboard" target="_blank" rel="noopener noreferrer">Leaderboard</a></li>
                    <li><a href="/next-race" target="_blank" rel="noopener noreferrer">Next Race</a></li>
                    <li><a href="/race-control" target="_blank" rel="noopener noreferrer">Race Control</a></li>
                    <li><a href="/race-countdown" target="_blank" rel="noopener noreferrer">Countdown</a></li>
                    <li><a href="/race-flags" target="_blank" rel="noopener noreferrer">Flag Display</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="page">

        <!-- Page content -->
        <div class="page-header">
            <div class="page-title">Next Race</div>
            <div class="page-subtitle">
                Upcoming drivers for the next race
            </div>
        </div>


        <!-- Grid layout -->
        <div class="grid">

            <!-- Next race card -->
            <div class="card card-md card-center">

                <div class="card-body">

                    <!-- Table from components.css -->
                    <table class="table next-race-table">

                        <thead>
                            <tr>
                                <th>Driver</th> <!--th = table header-->
                                <th>Car</th>
                            </tr>
                        </thead>

                        <tbody id="drivers-table">

                            <!-- Placeholder when empty -->
                            <tr>
                                <td colspan="2" class="placeholder"> <!--td = table data cell-->
                                    No next race data yet
                                </td>
                            </tr>

                        </tbody>

                    </table>

                    <table class="table next-race-table">
                    </table>

                    <div id="paddock-message" class="paddock-alert" style="display: none; margin-top: 20px;">
                        <div class="paddock-text">
                            <strong>Next race starting soon, proceed to the paddock!</strong>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>


    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const menuItem = document.querySelector(".menu-item");
            if (!menuItem) return;

            menuItem.addEventListener("click", (event) => {
                if (event.target.closest(".dropdown")) return;
                event.preventDefault();
                if (menuItem.classList.contains("menu-open")) {
                    menuItem.classList.remove("menu-open");
                    menuItem.blur();
                } else {
                    menuItem.classList.add("menu-open");
                }
            });

            document.addEventListener("click", (event) => {
                if (!menuItem.contains(event.target)) {
                    menuItem.classList.remove("menu-open");
                    menuItem.blur();
                }
            });
        });

        const socket = io();

        socket.on("connect", () => {
            console.log("Next Race screen connected");
            socket.emit("requestSessions"); // fetch current sessions on load/refresh
            socket.emit("requestState");    // fetch current state on load/refresh
        });


        // Listen for session updates
        socket.on("sessionsUpdated", (sessions) => {
            const tbody = document.getElementById("drivers-table");
            tbody.innerHTML = ""; // clear previous rows

            if (!sessions || sessions.length === 0) {
                // No upcoming sessions
                const tr = document.createElement("tr");
                const td = document.createElement("td");
                td.colSpan = 2;
                td.innerText = "No upcoming races";
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            // Show the first session only (next session)
            const nextSession = sessions[0];

            if (!nextSession.drivers || nextSession.drivers.length === 0) {
                const tr = document.createElement("tr");
                const td = document.createElement("td");
                td.colSpan = 2;
                td.innerText = "No drivers in next session";
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            // Populate drivers
            nextSession.drivers.forEach(driver => {
                const tr = document.createElement("tr");

                const tdName = document.createElement("td");

                const nameDiv = document.createElement("div");
                nameDiv.className = "driver-name-scroll";
                nameDiv.textContent = driver.name;

                tdName.appendChild(nameDiv);
                tr.appendChild(tdName);

                const tdCar = document.createElement("td");
                tdCar.innerText = driver.carNumber;
                tr.appendChild(tdCar);

                tbody.appendChild(tr);
            });
        });

        // Jälgib, kas eelmine sessioon on lõppenud,et teada millal paddock msg näidata
        let sessionJustEnded = false;
        // Refreshimisel ei kao paddock msg ära
        socket.on("stateUpdated", (state) => {
            if (!state.raceStarted && state.lastFinishedSession) {
                sessionJustEnded = true;
            }

            const paddockMsg = document.getElementById("paddock-message");
            // Näita sõnumit ainult siis, kui sessioon on lõppenud JA järjekorras on sõitjatega sessioone
            if (sessionJustEnded && state.sessions && state.sessions.length > 0 && state.sessions[0].drivers.length > 0) {
                paddockMsg.style.display = "flex";
            } else {
                paddockMsg.style.display = "none";
            }
        });

        // Näitab paddock sõnumit, kui sõit lõppeb
        socket.on("sessionEnded", (state) => {
            sessionJustEnded = true;
            const paddockMsg = document.getElementById("paddock-message");
            // Näitab sõnumit ainult siis, kui järjekorras on sõitjaid
            if (state.sessions && state.sessions.length > 0 && state.sessions[0].drivers.length > 0) {
                paddockMsg.style.display = "flex";
            } else {
                paddockMsg.style.display = "none";
            }
        });

        // Kui uus race algab, peida paddock sõnum ja lähtesta sessionJustEnded
        socket.on("raceStarted", () => {
            const paddockMsg = document.getElementById("paddock-message");
            paddockMsg.style.display = "none";
        });

        // Kui front deskis lisatakse uusi sõitjaid, näitab paddock sõnumit
        socket.on("sessionsUpdated", (sessions) => {
            if (!sessionJustEnded) return;
            const paddockMsg = document.getElementById("paddock-message");
            if (sessions && sessions.length > 0 && sessions[0].drivers.length > 0) {
                paddockMsg.style.display = "flex";
            } else {
                paddockMsg.style.display = "none";
            }
        });

    </script>

</body>

</html>
