<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Race Flags</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/components.css">
</head>


<body class="flag-screen flag-safe">

    <h1 id="flag-text">SAFE</h1>

    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();

        const body = document.body;
        const flagText = document.getElementById("flag-text");

        let RACE_MODES = {};

        // Function to update screen
        function updateFlag(mode) {
            // eemalda vanad klassid
            body.classList.remove("flag-safe", "flag-hazard", "flag-danger", "flag-finish");

            const m = (mode || "DANGER").toUpperCase();

            const safe = (RACE_MODES.SAFE || "SAFE").toUpperCase();           //15.1
            const hazard = (RACE_MODES.HAZARD || "HAZARD").toUpperCase();      //15.1
            const finish = (RACE_MODES.FINISH || "FINISH").toUpperCase();       //15.1 constants

            if (m === safe) {    //15.1 "SAFE" to safe
                body.classList.add("flag-safe");
                flagText.textContent = "SAFE";
            }
            else if (m === hazard) {    //15.1 constants
                body.classList.add("flag-hazard");
                flagText.textContent = "HAZARD";
            }
            else if (m === finish) {     //15.1 constants
                body.classList.add("flag-finish");
                flagText.textContent = "FINISH";
            }
            else {
                body.classList.add("flag-danger");
                flagText.textContent = "DANGER";
            }
        }

        socket.on("stateUpdated", (state) => {
            if (state && state.raceMode) {
                updateFlag(state.raceMode);
            }
        });

        socket.on("initConstants", (constants) => {     //15.1 constants
            RACE_MODES = constants.RACE_MODES;
        });

        socket.on("flagChanged", (mode) => {
            updateFlag(mode);
        });

        socket.on("connect", () => {
            console.log("Connected to server");
        });
    </script>

</body>

</html>
